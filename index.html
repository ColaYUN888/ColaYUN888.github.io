<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYGG - 专业游戏美术外包</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",Arial,sans-serif}
body{background:#1a1a1a;color:#fff}

.head-top{height:34px;background:#000;line-height:34px;font-size:12px;color:#999}
.inner{width:1200px;margin:0 auto}
.fr{float:right}
.lang a{color:#fff;margin:0 10px;text-decoration:none}

.logo-big{text-align:center;background:#111;font-size:80px;padding:20px 0}
.head-nav{background:#111;padding:15px 0;text-align:center}
.nav{list-style:none;padding:0;display:flex;justify-content:center;gap:40px}
.nav a{color:#fff;font-size:24px;text-decoration:none}
.subnav{background:#222;padding:12px 0}
.subnav ul{list-style:none;padding:0;display:flex;justify-content:center;gap:25px}
.subnav a{color:#fff;font-size:16px;text-decoration:none}

.main{width:1200px;margin:0 auto;padding:30px}
.case-list{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.case-item{width:280px}
.box{cursor:pointer}
img{width:100%;height:auto;border-radius:8px}

.page{display:none}
.page.active{display:block}

/* 这里修复了放大不变形！ */
.img-popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.img-popup img{
  max-width:95%;
  max-height:95%;
  width:auto;
  height:auto;
  object-fit:contain;
}
.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="head-top">
  <div class="inner">
    <div class="fr">
      <span>madianyi@skyline.com</span>
      <span class="lang"><a href="#">中文</a><a href="#">EN</a></span>
    </div>
  </div>
</div>

<div class="logo-big">CYGG</div>

<div class="head-nav">
  <ul class="nav">
    <li><a class="nav-btn active" data-page="home">首页</a></li>
    <li><a class="nav-btn" data-page="art">作品展示</a></li>
    <li><a class="nav-btn" data-page="about">关于我们</a></li>
    <li><a class="nav-btn" data-page="contact">联系我们</a></li>
  </ul>
</div>

<div class="subnav">
  <ul>
    <li><a class="sub-btn active" data-cat="all">全部</a></li>
    <li><a class="sub-btn" data-cat="scene">场景原画</a></li>
    <li><a class="sub-btn" data-cat="char">角色原画</a></li>
    <li><a class="sub-btn" data-cat="card">卡牌插画</a></li>
    <li><a class="sub-btn" data-cat="ui">UI设计</a></li>
    <li><a class="sub-btn" data-cat="model">3D模型</a></li>
  </ul>
</div>

<div class="main">
  <div id="home" class="page active">
    <h2>欢迎来到 CYGG 游戏美术工作室</h2>
    <br>
    <p>专注游戏原画 / 3D模型 / 场景设计 / 美术外包</p>
  </div>

  <div id="art" class="page">
    <div class="case-list">
      <div class="case-item" data-cat="scene">
        <div class="box" onclick="openPopup(this)">
          <img src="a.jpg">
        </div>
      </div>
      <div class="case-item" data-cat="scene">
        <div class="box" onclick="openPopup(this)">
          <img src="b.jpg">
        </div>
      </div>
    </div>
  </div>

  <div id="about" class="page"><h2>关于我们</h2><br><p>专业游戏美术定制服务</p></div>
  <div id="contact" class="page"><h2>商务合作</h2><br><p>邮箱：madianyi@skyline.com</p></div>
</div>

<div class="img-popup" id="popup">
  <span class="close" onclick="closePopup()">×</span>
  <img id="popupImg">
</div>

<script>
// 主导航切换
const navBtns = document.querySelectorAll('.nav-btn');
const pages = document.querySelectorAll('.page');
navBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    navBtns.forEach(b=>b.classList.remove('active'));
    pages.forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.page).classList.add('active');
  })
})

// 子分类切换
const subBtns = document.querySelectorAll('.sub-btn');
const artItems = document.querySelectorAll('#art .case-item');
subBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    subBtns.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    let t = btn.dataset.cat;
    artItems.forEach(i=>{
      if(t=='all' || i.dataset.cat==t) i.style.display='block';
      else i.style.display='none';
    })
  })
})

// 图片弹窗（已修复不变形）
function openPopup(el){
  document.getElementById('popup').style.display='flex';
  document.getElementById('popupImg').src=el.querySelector('img').src;
}
function closePopup(){
  document.getElementById('popup').style.display='none';
}
document.getElementById('popup').addEventListener('click',function(e){
  if(e.target===this) closePopup();
})
</script>
</body>
</html>
