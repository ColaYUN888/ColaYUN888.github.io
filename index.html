<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYGG - 专业游戏美术外包</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",Arial,sans-serif}
        body{background:#1e1e1e;color:#fff;}
        
        /* 导航栏 */
        nav{background:#2d2d2d;padding:15px 20px;display:flex;gap:30px;align-items:center;justify-content:center;}
        nav a{color:#ccc;text-decoration:none;font-size:14px;padding:8px 12px;}
        nav a.active{color:#00d8ff;border-bottom:2px solid #00d8ff;}
        nav a:hover{color:#00d8ff;}

        /* 分类标签 */
        .category{text-align:center;padding:30px 0;}
        .category a{color:#ccc;text-decoration:none;margin:0 12px;font-size:16px;}
        .category a.active{color:#fff;font-weight:bold;}

        /* 作品网格 */
        .portfolio-grid{
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:15px;
            padding:0 20px 40px;
            max-width:1400px;
            margin:0 auto;
        }
        .portfolio-item{
            background:#2d2d2d;
            border-radius:4px;
            overflow:hidden;
        }
        .portfolio-item img{
            width:100%;
            display:block;
        }
        .portfolio-item:hover{opacity:0.85;}

        /* 页脚 */
        footer{text-align:center;padding:20px;color:#666;font-size:12px;}
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <a href="#">首页</a>
        <a href="#">关于我们</a>
        <a href="#">我们团队</a>
        <a href="#">我们优势</a>
        <a href="#" class="active">作品展示</a>
        <a href="#">合作伙伴</a>
        <a href="#">联系我们</a>
    </nav>

    <!-- 作品分类 -->
    <div class="category">
        <a href="#" class="active">场景原画</a>
        <a href="#">角色原画</a>
        <a href="#">装备道具</a>
        <a href="#">美术宣传</a>
    </div>

    <!-- 作品展示墙 -->
    <div class="portfolio-grid">
        <div class="portfolio-item">
            <img src="https://picsum.photos/seed/scene1/600/350.jpg" alt="场景原画01">
        </div>
        <div class="portfolio-item">

        <div class="portfolio-item">

</body>
