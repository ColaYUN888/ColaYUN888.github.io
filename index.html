    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",Arial,sans-serif}
        body{background:#1e1e1e;color:#fff;}
        
        /* 导航栏 */
        nav{background:#2d2d2d;padding:15px 20px;display:flex;gap:30px;align-items:center;justify-content:center;flex-wrap:wrap;}
        nav a{color:#ccc;text-decoration:none;font-size:16px;padding:8px 12px;}
        nav a.active{color:#00d8ff;border-bottom:2px solid #00d8ff;}
        nav a:hover{color:#00d8ff;}

        /* 作品分类 */
        .category{text-align:center;padding:30px 0;}
        .category a{color:#ccc;text-decoration:none;margin:0 12px;font-size:18px;cursor:pointer;}
        .category a.active{color:#fff;font-weight:bold;}
        .category a:hover{color:#00d8ff;}

        /* 作品网格 */
        .portfolio-grid{
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:15px;
            padding:0 20px 40px;
            max-width:1400px;
            margin:0 auto;
        }
        .portfolio-item{
            background:#2d2d2d;
            border-radius:6px;
            overflow:hidden;
            display:none;
        }
        .portfolio-item.active{display:block;}
        .portfolio-item img{
            width:100%;
            display:block;
        }
        .portfolio-item:hover{opacity:0.85;}

        /* 联系我们模块 */
        .contact{
            background:#2d2d2d;
            padding:30px;
            text-align:center;
            margin:0 20px 40px;
            border-radius:8px;
        }
        .contact h2{margin-bottom:20px;color:#00d8ff;}
        .contact p{font-size:17px;margin:10px 0;color:#ccc;}
        .contact strong{color:#fff;}

        /* 页脚 */
        footer{text-align:center;padding:20px;color:#666;font-size:14px;}
    </style>
</head>

    <!-- 分类切换JS -->
    <script>
        const cats = document.querySelectorAll('.cat');
        const items = document.querySelectorAll('.portfolio-item');
        
        cats.forEach(cat => {
            cat.addEventListener('click', () => {
                cats.forEach(c => c.classList.remove('active'));
                cat.classList.add('active');
                const target = cat.dataset.cat;
                items.forEach(item => {
                    item.classList.toggle('active', item.dataset.cat === target);
                });
            });
        });
    </script>
